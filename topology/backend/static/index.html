<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>IoT Topology Monitor</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div id="app">
    <header>
      <h1>🔧 IoT Topology Monitor</h1>
      <div id="status">
        <span id="ws-status" class="disconnected">● Disconnected</span>
        <span id="last-update">Never</span>
      </div>
    </header>

    <!-- KPI Cards (clickable drill-down) -->
    <section id="kpis">
      <button class="kpi-card" id="kpi-total" data-filter="all" title="Show all devices">
        <span class="kpi-label">Devices</span>
        <span class="kpi-value">—</span>
      </button>
      <button class="kpi-card online" id="kpi-online" data-filter="status:online" title="Show online devices">
        <span class="kpi-label">Online</span>
        <span class="kpi-value">—</span>
      </button>
      <button class="kpi-card offline" id="kpi-offline" data-filter="status:offline" title="Show offline devices">
        <span class="kpi-label">Offline</span>
        <span class="kpi-value">—</span>
      </button>
      <button class="kpi-card degraded" id="kpi-degraded" data-filter="status:degraded" title="Show degraded devices">
        <span class="kpi-label">Degraded</span>
        <span class="kpi-value">—</span>
      </button>
      <button class="kpi-card" id="kpi-edges" data-filter="edges" title="Scroll to topology graph">
        <span class="kpi-label">Edges</span>
        <span class="kpi-value">—</span>
      </button>
      <button class="kpi-card critical" id="kpi-critical" data-filter="events:critical" title="Show critical events from the last 24 hours">
        <span class="kpi-label">Critical (24h)</span>
        <span class="kpi-value">—</span>
      </button>
    </section>

    <!-- Live Event Feed -->
    <section id="events">
      <h2>🚨 Live Events</h2>
      <div id="event-list"></div>
    </section>

    <!-- Drill-down table (populated by KPI clicks, type chips, or topology node clicks) -->
    <section id="drilldown">
      <div class="drilldown-header">
        <h2>🔎 Drill-down</h2>
        <div class="drilldown-controls">
          <span class="muted">Filter by type:</span>
          <div id="device-type-chips" class="type-chips">
            <span class="muted">Loading…</span>
          </div>
        </div>
      </div>
      <div id="drilldown-table-container">
        <p class="muted">Click a KPI card above, a device type, or a node in the topology to see the matching devices here.</p>
      </div>
    </section>

    <!-- Topology Graph -->
    <section id="topology">
      <h2>🕸️ Topology</h2>
      <svg id="graph" width="100%" height="600"></svg>
    </section>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
