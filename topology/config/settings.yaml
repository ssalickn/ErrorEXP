# topology/config/settings.yaml
# Central runtime settings. Override via environment variables (see settings.env).

postgres:
  host: ${POSTGRES_HOST:localhost}
  port: ${POSTGRES_PORT:5432}
  user: ${POSTGRES_USER:topology}
  password: ${POSTGRES_PASSWORD:topology}
  database: ${POSTGRES_DB:topology}

neo4j:
  uri: ${NEO4J_URI:bolt://localhost:7687}
  user: ${NEO4J_USER:neo4j}
  password: ${NEO4J_PASSWORD:neo4j}
  database: ${NEO4J_DB:neo4j}

spark:
  app_name: topology-tier2
  master: ${SPARK_MASTER:local[*]}
  executor_memory: 4g
  shuffle_partitions: 200

discovery:
  tier1:
    snmp:
      community: ${SNMP_COMMUNITY:public}
      version: v2c          # v2c | v3
      v3_user: ${SNMP_V3_USER:}
      v3_auth_key: ${SNMP_V3_AUTH:}
      v3_priv_key: ${SNMP_V3_PRIV:}
      timeout_s: 2
      retries: 2
    onvif:
      ws_discovery_multicast: 239.255.255.250
      ws_discovery_port: 3702
      probe_timeout_s: 5
    biostar:
      base_url: ${BIOSTAR_BASE_URL:https://localhost:5005}
      username: ${BIOSTAR_USER:}
      password: ${BIOSTAR_PASSWORD:}
    honeywell:
      export_dir: ${HONEYWELL_EXPORT_DIR:./var/honeywell_exports}
  tier2:
    failure_window_minutes: 10
    delta_minutes: 5
    min_lift: 5.0
    min_sequence_support: 50

confidence:
  auto_accept: 0.9
  auto_flag:   0.6
  suggest:     0.3
  reject:      0.0

refresh:
  cadence: hourly           # hourly | daily
  drift_alert_webhook: ${DRIFT_WEBHOOK:}
  drift_lift_threshold: 5.0

logging:
  level: INFO
  json: true
