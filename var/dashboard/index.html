<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>ErrorDet — IoT Topology Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/vis-network/9.1.9/styles/vis-network.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/vis-network/9.1.9/standalone/umd/vis-network.min.js"></script>
  <style>
    :root {
      --bg: #0e1726;
      --panel: #172033;
      --panel-2: #1e2a44;
      --border: #2a3a5c;
      --text: #e6edf7;
      --muted: #8aa1c1;
      --accent: #2c7be5;
      --warn: #f5a623;
      --bad: #d9534f;
      --good: #29b574;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; background: var(--bg); color: var(--text);
                 font-family: -apple-system, "Segoe UI", system-ui, sans-serif; }
    header { padding: 12px 18px; background: var(--panel); border-bottom: 1px solid var(--border);
             display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    header h1 { margin: 0; font-size: 16px; font-weight: 600; letter-spacing: 0.3px; }
    header .logo { height: 26px; width: auto; display: block;
                   background: #ffffff; padding: 3px 8px; border-radius: 3px; }
    header .brand { display: flex; align-items: center; gap: 10px; }
    header .badge { background: var(--accent); color: #fff; font-size: 11px;
                    padding: 2px 8px; border-radius: 10px; font-weight: 600; }
    
    .kpi-card { background: var(--panel-2); border: 1px solid var(--border); color: var(--text);
                padding: 6px 12px; border-radius: 6px; font-size: 12px; cursor: pointer;
                display: flex; align-items: center; gap: 6px; transition: all 0.15s;
                font-family: inherit; }
    .kpi-card:hover { border-color: var(--accent); background: #243454; }
    .kpi-card.active { border-color: var(--accent); background: var(--accent); }
    .kpi-card b { font-size: 13px; }
    .kpi-card.active b, .kpi-card.active span { color: #fff !important; }

    header .spacer { flex: 1; }
    header .ws-status { font-size: 11px; padding: 2px 8px; border-radius: 8px; }
    header .ws-status.connected { background: var(--good); color: #fff; }
    header .ws-status.disconnected { background: var(--bad); color: #fff; }
    header .last-update { font-size: 11px; color: var(--muted); }
    
    main { display: grid; grid-template-columns: 1fr 380px; height: calc(100% - 49px); }
    #graph { background: var(--bg); }
    aside { background: var(--panel); border-left: 1px solid var(--border);
            padding: 14px 16px; overflow-y: auto; display: flex; flex-direction: column; gap: 14px; }
    aside h2 { font-size: 12px; text-transform: uppercase; color: var(--muted);
               letter-spacing: 0.6px; margin: 0; }
    
    .search-box { width: 100%; background: var(--panel-2); color: var(--text);
                  border: 1px solid var(--border); padding: 6px 10px;
                  border-radius: 4px; font-size: 12px; font-family: inherit; }
    
    .drilldown { display: flex; flex-direction: column; gap: 8px; flex: 1; min-height: 0; }
    
    .device-list { list-style: none; margin: 0; padding: 0; max-height: 320px; overflow-y: auto;
                   border: 1px solid var(--border); border-radius: 4px; background: var(--bg); }
    .device-list li { padding: 7px 10px; cursor: pointer; border-bottom: 1px solid var(--border);
                      font-size: 12px; display: flex; align-items: center; gap: 8px; }
    .device-list li:last-child { border-bottom: none; }
    .device-list li:hover { background: var(--panel-2); }
    .device-list li.selected { background: var(--accent); color: #fff; }
    .device-list li.selected .dot { box-shadow: 0 0 0 2px rgba(255,255,255,0.3); }
    .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .dot.online { background: var(--good); }
    .dot.degraded { background: var(--warn); }
    .dot.offline { background: var(--bad); }
    .dot.unknown { background: var(--muted); }
    
    .chips-grid { display: flex; flex-wrap: wrap; gap: 4px; }
    .chip { background: var(--panel-2); border: 1px solid var(--border); font-size: 11px;
            padding: 3px 8px; border-radius: 12px; cursor: pointer; color: var(--muted);
            transition: all 0.15s; }
    .chip:hover { border-color: var(--muted); color: var(--text); }
    .chip.active { background: var(--accent); border-color: var(--accent); color: #fff; }

    .detail { background: var(--panel-2); border: 1px solid var(--border);
              border-radius: 6px; padding: 10px 12px; font-size: 12px; }
    .detail h3 { margin: 0 0 6px; font-size: 13px; color: #fff; word-break: break-all; }
    .detail .row { display: flex; justify-content: space-between; gap: 8px;
                   padding: 2px 0; color: var(--muted); }
    .detail .row b { color: var(--text); font-weight: 500; }
    .detail .neighbors { margin-top: 8px; padding-top: 8px;
                         border-top: 1px solid var(--border); }
    .detail .neighbors ul { margin: 4px 0 0 0; padding-left: 16px; }
  </style>
</head>
<body>
  <header>
    <div class="brand">
      <img class="logo" src="nucor-logo.png" alt="Nucor logo" onerror="this.style.display='none'">
      <h1>ErrorDet</h1>
    </div>
    <span class="badge">IoT Topology</span>
    
    <button class="kpi-card active" data-filter="all">
      <span>Devices:</span> <b id="stat-devices">—</b>
    </button>
    <button class="kpi-card" data-filter="online">
      <span class="dot online"></span> <span>Online:</span> <b id="stat-online">—</b>
    </button>
    <button class="kpi-card" data-filter="degraded">
      <span class="dot degraded"></span> <span>Degraded:</span> <b id="stat-degraded">—</b>
    </button>
    <button class="kpi-card" data-filter="offline">
      <span class="dot offline"></span> <span>Offline:</span> <b id="stat-offline">—</b>
    </button>
    <button class="kpi-card" data-filter="critical">
      <span>Critical (24h):</span> <b id="stat-critical">—</b>
    </button>
    <button class="kpi-card" data-filter="pending">
      <span>Pending review:</span> <b id="stat-pending">—</b>
    </button>
    
    <span class="spacer"></span>
    <span class="ws-status disconnected" id="ws-status">● Polling</span>
    <span class="last-update" id="last-update">Never</span>
  </header>
  
  <main>
    <div id="graph"></div>
    <aside>
      <div>
        <h2>Filter by Device Type</h2>
        <div class="chips-grid" id="type-chips" style="margin-top: 6px;"></div>
      </div>

      <div class="drilldown">
        <h2 id="drilldown-heading">Devices (All)</h2>
        <input type="text" id="search" class="search-box" placeholder="Filter current list..." />
        <ul class="device-list" id="device-list"></ul>

        <div class="detail" id="detail" style="display:none;">
          <h3 id="detail-title"></h3>
          <div id="detail-body"></div>
        </div>
      </div>
    </aside>
  </main>

  <script src="app.js"></script>
</body>
</html>
