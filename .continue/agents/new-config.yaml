version: 1.0.0
schema: v1
name: Local Gemma 4 Config

models:
  - name: Gemma 4 E2B
    provider: ollama
    model: gemma4:e2b
    roles:
      - chat
      - edit
      - apply
    capabilities:
      - tool_use
    requestOptions:
      temperature: 1.0
      extraBodyProperties:
        think: true 

# 1. Tells Continue what model to use for inline code suggestions
tabAutocompleteModel:
  name: Gemma 4 E2B Autocomplete
  provider: ollama
  model: gemma4:e2b
  requestOptions:
    extraBodyProperties:
      think: false

# 2. Replaces OpenAI with Ollama for indexing your codebase locally
embeddingsProvider:
  provider: ollama
  model: gemma4:e2b # Or use a dedicated local model like "nomic-embed-text" if you downloaded it

# 3. Optional: This stops Continue from checking for OpenAI completely
# providers:
#   openai: null